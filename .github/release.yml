changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
  categories:
    - title: Breaking Changes
      labels: [breaking]
    - title: Features
      labels: [feature, enhancement]
    - title: Bug Fixes
      labels: [bug, fix]
    - title: Safety & Security
      labels: [security, safety]
    - title: Documentation
      labels: [docs, documentation]
    - title: Dependencies
      labels: [dependencies]
    - title: Other
      labels: ["*"]
